@for (item of produtos(); track item){
    <app-produto
    [nome] = "item.nome"
    [preco] = "item.preco"
    (produtoSelecionado)="exibirProduto($event)"
    >
    </app-produto>
}
<p><button (click)="adicionarProdutos()">Adicionar Produto</button></p>
<h2>Total de produtos: {{totalprodutos()}}</h2>
<h3>Valor total: {{valorTotal() | precoFormatado}}</h3>
<p><button (click)="substituirProdutos()">substituir Produtos</button></p>
